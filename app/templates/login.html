{% extends "base.html" %}
{% block title %}{{ t("login.title") }}{% endblock %}
{% block content %}
<form method="post" action="{{ url_for('main.login') }}" class="card">
    <h2>{{ t("login.heading") }}</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for message in messages %}<p class="error">{{ message }}</p>{% endfor %}{% endif %}
    {% endwith %}
    <input type="text" name="u" placeholder="{{ t('login.username') }}" required autofocus>
    <input type="password" name="p" placeholder="{{ t('login.password') }}" required>
    <button type="submit">{{ t("login.submit") }}</button>
</form>
{% endblock %}
