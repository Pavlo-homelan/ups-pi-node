<header class="page-header">
    <a class="page-brand" href="{{ url_for('main.dashboard') }}">
        <span class="page-brand-main">ups-pi-node</span>
    </a>
    <div class="page-tabs">
        {% include "_tabs.html" %}
    </div>
    <div class="header-actions">
        <span class="header-user">{{ current_user or session.get("username") }}</span>
        <form method="post" action="{{ url_for('main.logout') }}">
            <button class="header-logout" type="submit">{{ t("header.logout") }}</button>
        </form>
    </div>
</header>
